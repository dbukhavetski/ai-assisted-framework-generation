name: Setup Yarn Workspace
description: Check out the repository, set up Node.js with Yarn cache, and install dependencies.
runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: yarn

    - name: Install dependencies
      shell: bash
      run: yarn install --immutable