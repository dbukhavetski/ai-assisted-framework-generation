name: Playwright Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      # Check out the pull request source.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the latest LTS version of Node.js and enable Yarn caching.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install project dependencies using the lockfile and cache constraints.
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers and required system dependencies.
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run the Playwright test suite in CI.
      - name: Run Playwright tests
        run: yarn playwright test

      # Always upload the HTML report for inspection.
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: warn

      # Always upload Playwright traces captured during test execution.
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/**/trace*.zip
            test-results/**/traces/**
          if-no-files-found: warn